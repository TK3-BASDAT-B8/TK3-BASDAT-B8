{% extends "base.html" %}

{% block content %}
  {% include "tickets/partials/ticket_page.html" %}

  <div class="fixed inset-0 z-40 bg-slate-950/45"></div>

  <div class="fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl">
      <div class="mb-5 flex items-start justify-between gap-4">
        <h1 class="text-lg font-extrabold tracking-tight text-slate-950">
          {% if form_mode == "edit" %}Update Tiket{% else %}Tambah Tiket Baru{% endif %}
        </h1>

        <a
          href="{% url 'tickets:ticket_list' %}?role={{ page_role }}"
          class="inline-flex h-8 w-8 items-center justify-center rounded-full text-2xl leading-none text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
        >
          &times;
        </a>
      </div>

      <form method="post">
        {% csrf_token %}

        {% if form_mode == "create" %}
          <div class="space-y-4">
            <div>
              <label class="mb-1.5 block text-[11px] font-extrabold uppercase tracking-wide text-slate-500">
                Order
              </label>
              <select
                id="ticket-order-select"
                name="order_id"
                required
                class="h-10 w-full rounded-xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              >
                <option value="">Pilih order</option>
                {% for order in orders %}
                  <option
                    value="{{ order.order_id }}"
                    data-event-id="{{ order.event_id }}"
                    {% if selected_ticket.order_id == order.order_id %}selected{% endif %}
                  >
                    {{ order.label }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div>
              <label class="mb-1.5 block text-[11px] font-extrabold uppercase tracking-wide text-slate-500">
                Kategori Tiket
              </label>
              <select
                id="ticket-category-select"
                name="category_id"
                required
                class="h-10 w-full rounded-xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              >
                <option value="">Pilih kategori</option>
                {% for category in categories %}
                  <option
                    value="{{ category.category_id }}"
                    data-event-id="{{ category.event_id }}"
                    data-venue-id="{{ category.venue_id }}"
                    data-reserved="{% if category.has_reserved_seating %}true{% else %}false{% endif %}"
                    data-remaining="{{ category.remaining }}"
                    {% if selected_ticket.category_id == category.category_id %}selected{% endif %}
                    {% if category.remaining <= 0 %}disabled{% endif %}
                  >
                    {{ category.label }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div id="ticket-seat-wrapper" class="hidden">
              <label class="mb-1.5 block text-[11px] font-extrabold uppercase tracking-wide text-slate-400">
                Kursi <span class="normal-case">(opsional — reserved seating)</span>
              </label>
              <select
                id="ticket-seat-select"
                name="seat_id"
                class="h-10 w-full rounded-xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              >
                <option value="">Tanpa Kursi</option>
                {% for seat in seats %}
                  <option
                    value="{{ seat.seat_id }}"
                    data-venue-id="{{ seat.venue_id }}"
                    {% if selected_ticket.seat_id == seat.seat_id %}selected{% endif %}
                  >
                    {{ seat.label }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div>
              <label class="mb-1.5 block text-[11px] font-extrabold uppercase tracking-wide text-slate-500">
                Kode Tiket
              </label>
              <input
                type="text"
                value="Auto-generate saat dibuat"
                readonly
                class="h-10 w-full rounded-xl border border-slate-100 bg-slate-50 px-4 font-mono text-sm font-semibold text-slate-400 outline-none"
              />
            </div>
          </div>
        {% else %}
          <div class="space-y-4">
            <div>
              <label class="mb-1.5 block text-[11px] font-extrabold uppercase tracking-wide text-slate-500">
                Kode Tiket
              </label>
              <input
                type="text"
                value="{{ selected_ticket.ticket_code }}"
                readonly
                class="h-10 w-full rounded-xl border border-slate-100 bg-slate-50 px-4 font-mono text-sm font-semibold text-slate-600 outline-none"
              />
            </div>

            <div>
              <label class="mb-1.5 block text-[11px] font-extrabold uppercase tracking-wide text-slate-500">
                Status Order
              </label>
              <select
                name="payment_status"
                required
                class="h-10 w-full rounded-xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              >
                {% for value,label in status_choices %}
                  <option value="{{ value }}" {% if selected_ticket.payment_status == value %}selected{% endif %}>
                    {{ label }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div>
              <label class="mb-1.5 block text-[11px] font-extrabold uppercase tracking-wide text-slate-400">
                Kursi
              </label>
              <select
                name="seat_id"
                class="h-10 w-full rounded-xl border border-slate-200 bg-white px-4 text-sm text-slate-700 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              >
                <option value="">Tanpa Kursi</option>
                {% for seat in seats %}
                  <option value="{{ seat.seat_id }}" {% if selected_ticket.seat_id == seat.seat_id %}selected{% endif %}>
                    {{ seat.label }}
                  </option>
                {% endfor %}
              </select>
            </div>
          </div>
        {% endif %}

        <div class="mt-6 grid grid-cols-2 gap-3">
          <a
            href="{% url 'tickets:ticket_list' %}?role={{ page_role }}"
            class="inline-flex h-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-sm font-bold text-slate-700 transition hover:bg-slate-50"
          >
            Batal
          </a>

          <button
            type="submit"
            class="inline-flex h-10 items-center justify-center rounded-xl bg-blue-600 text-sm font-bold text-white shadow-sm transition hover:bg-blue-700"
          >
            {% if form_mode == "edit" %}Simpan{% else %}Buat Tiket{% endif %}
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function updateTicketCreateFields() {
      const orderSelect = document.getElementById('ticket-order-select');
      const categorySelect = document.getElementById('ticket-category-select');

      if (!orderSelect || !categorySelect) return;

      const selectedOrder = orderSelect.options[orderSelect.selectedIndex];
      const orderEventId = selectedOrder ? selectedOrder.dataset.eventId || '' : '';

      let firstEnabledCategory = null;

      Array.from(categorySelect.options).forEach(function(option) {
        if (!option.value) {
          option.hidden = false;
          option.disabled = false;
          return;
        }

        const matchesEvent = !orderEventId || option.dataset.eventId === orderEventId;
        const hasQuota = parseInt(option.dataset.remaining || '0', 10) > 0;

        option.hidden = !matchesEvent;
        option.disabled = !matchesEvent || !hasQuota;

        if (!firstEnabledCategory && !option.disabled) {
          firstEnabledCategory = option;
        }
      });

      const selectedCategory = categorySelect.options[categorySelect.selectedIndex];

      if (!selectedCategory || selectedCategory.disabled) {
        categorySelect.value = firstEnabledCategory ? firstEnabledCategory.value : '';
      }

      updateSeatOptions();
    }

    function updateSeatOptions() {
      const categorySelect = document.getElementById('ticket-category-select');
      const seatSelect = document.getElementById('ticket-seat-select');
      const seatWrapper = document.getElementById('ticket-seat-wrapper');

      if (!categorySelect || !seatSelect || !seatWrapper) return;

      const selectedCategory = categorySelect.options[categorySelect.selectedIndex];
      const venueId = selectedCategory ? selectedCategory.dataset.venueId || '' : '';
      const reserved = selectedCategory ? selectedCategory.dataset.reserved === 'true' : false;

      seatWrapper.classList.toggle('hidden', !reserved);

      Array.from(seatSelect.options).forEach(function(option) {
        if (!option.value) {
          option.hidden = false;
          option.disabled = false;
          return;
        }

        const matchesVenue = option.dataset.venueId === venueId;

        option.hidden = !matchesVenue;
        option.disabled = !matchesVenue;
      });

      const selectedSeat = seatSelect.options[seatSelect.selectedIndex];

      if (!reserved || !selectedSeat || selectedSeat.disabled) {
        seatSelect.value = '';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const orderSelect = document.getElementById('ticket-order-select');
      const categorySelect = document.getElementById('ticket-category-select');

      if (orderSelect) {
        orderSelect.addEventListener('change', updateTicketCreateFields);
      }

      if (categorySelect) {
        categorySelect.addEventListener('change', updateSeatOptions);
      }

      updateTicketCreateFields();
    });
  </script>
{% endblock %}
