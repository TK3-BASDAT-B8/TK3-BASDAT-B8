{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-slate-50">
  <div class="mx-auto max-w-5xl px-6 py-8">
    <div class="mb-6 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight text-slate-950">
          {{ page_title }}
        </h1>
        <p class="mt-1 text-sm text-slate-500">
          {{ page_subtitle }}
        </p>
      </div>

      {% if can_create_ticket %}
        <a
          href="{% url 'tickets:ticket_create' %}?role={{ page_role }}&reserved=1"
          class="inline-flex items-center gap-2 rounded-full bg-blue-600 px-4 py-2 text-sm font-bold text-white shadow-sm transition hover:bg-blue-700"
        >
          <span class="text-base leading-none">+</span>
          Tambah Tiket
        </a>
      {% endif %}
    </div>

    <div class="mb-5 grid grid-cols-1 gap-4 md:grid-cols-3">
      <div class="rounded-2xl border border-slate-100 bg-white px-6 py-7 shadow-sm">
        <p class="text-[11px] font-extrabold uppercase tracking-wide text-slate-400">
          Total Tiket
        </p>
        <h2 class="mt-4 text-2xl font-extrabold text-slate-950">
          {{ stats.total }}
        </h2>
      </div>

      <div class="rounded-2xl border border-slate-100 bg-white px-6 py-7 shadow-sm">
        <p class="text-[11px] font-extrabold uppercase tracking-wide text-slate-400">
          Valid
        </p>
        <h2 class="mt-4 text-2xl font-extrabold text-slate-950">
          {{ stats.valid }}
        </h2>
      </div>

      <div class="rounded-2xl border border-slate-100 bg-white px-6 py-7 shadow-sm">
        <p class="text-[11px] font-extrabold uppercase tracking-wide text-slate-400">
          Terpakai
        </p>
        <h2 class="mt-4 text-2xl font-extrabold text-slate-950">
          {{ stats.used }}
        </h2>
      </div>
    </div>

    <form method="get" class="mb-5 grid grid-cols-1 gap-3 md:grid-cols-5">
      <input type="hidden" name="role" value="{{ page_role }}">

      <div class="relative md:col-span-2">
        <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
          </svg>
        </span>

        <input
          type="text"
          name="q"
          value="{{ request.GET.q }}"
          placeholder="Cari kode tiket atau nama acara..."
          class="h-9 w-full rounded-xl border border-slate-200 bg-white pl-9 pr-3 text-xs text-slate-700 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
        />
      </div>

      <div class="md:col-span-1">
        <select
          name="status"
          onchange="this.form.submit()"
          class="h-9 w-full rounded-xl border border-slate-200 bg-white px-3 text-xs text-slate-700 shadow-sm outline-none transition focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
        >
          <option value="">Semua Status</option>
          <option value="Valid" {% if request.GET.status == "Valid" %}selected{% endif %}>Valid</option>
          <option value="Used" {% if request.GET.status == "Used" %}selected{% endif %}>Terpakai</option>
        </select>
      </div>
    </form>

    {% include "tickets/partials/ticket_cards.html" %}
  </div>
</div>
{% endblock %}
