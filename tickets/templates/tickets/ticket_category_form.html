<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50"
     onclick="if(event.target===this) document.getElementById('modal-root').innerHTML=''">
    <div class="bg-white rounded-2xl w-full max-w-md mx-4 p-6 shadow-xl">
        <div class="flex items-center justify-between mb-5">
            <h2 class="text-lg font-bold text-gray-900">
                {% if action == 'edit' %}Edit Kategori{% else %}Tambah Kategori Baru{% endif %}
            </h2>
            <button type="button" onclick="document.getElementById('modal-root').innerHTML=''"
                class="text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form method="post" action="{% if action == 'edit' %}{% url 'ticket_category_edit' category.category_id %}{% else %}{% url 'ticket_category_create' %}{% endif %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                    Acara <span class="text-red-500">*</span>
                </label>
                <select name="tevent_id" required
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Pilih Acara</option>
                    {% for event in events %}
                    <option value="{{ event.event_id }}"
                        {% if action == 'edit' and category.tevent_id == event.event_id %}selected{% endif %}>
                        {{ event.event_title }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                    Nama Kategori <span class="text-red-500">*</span>
                </label>
                <input type="text" name="category_name" required
                    value="{% if action == 'edit' %}{{ category.category_name }}{% endif %}"
                    placeholder="cth. WVIP"
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                        Harga (Rp) <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="price" required min="0"
                        value="{% if action == 'edit' %}{{ category.price }}{% endif %}"
                        placeholder="750000"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
                        Kuota <span class="text-red-500">*</span>
                    </label>
                    <input type="number" name="quota" required min="1"
                        value="{% if action == 'edit' %}{{ category.quota }}{% endif %}"
                        placeholder="100"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="flex gap-3">
                <button type="button" onclick="document.getElementById('modal-root').innerHTML=''"
                    class="flex-1 border border-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50">
                    Batal
                </button>
                <button type="submit"
                    class="flex-1 bg-blue-600 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-blue-700">
                    {% if action == 'edit' %}Simpan{% else %}Tambah{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
