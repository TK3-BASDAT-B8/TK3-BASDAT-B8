{% extends "base.html" %}
{% block content %}
  {% include "venues/partials/venue_page.html" %}
  <div class="fixed inset-0 z-40 bg-slate-950/50"></div>
  <div class="fixed inset-0 z-50 flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md rounded-3xl bg-white p-6 shadow-2xl">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-extrabold text-red-600">Hapus Venue</h2>
        <a href="{% url 'venues:venue_list' %}" class="text-3xl leading-none text-slate-400 hover:text-slate-700">&times;</a>
      </div>
      <p class="text-sm leading-6 text-slate-600">Yakin ingin menghapus venue <strong>{{ selected_venue.venue_name }}</strong> di kota <strong>{{ selected_venue.city }}</strong>?</p>
      <form method="post" class="mt-6 grid grid-cols-2 gap-3">
        {% csrf_token %}
        <a href="{% url 'venues:venue_list' %}" class="inline-flex h-11 items-center justify-center rounded-2xl border border-slate-200 text-sm font-extrabold text-slate-700 hover:bg-slate-50">Batal</a>
        <button class="h-11 rounded-2xl bg-red-600 text-sm font-extrabold text-white hover:bg-red-700">Hapus</button>
      </form>
    </div>
  </div>
{% endblock %}
