{% extends 'base.html' %}

{% block title %}Hapus Promo{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl border shadow-sm p-6">
  <p class="text-sm font-semibold text-red-600">PROMOTION</p>
  <h1 class="text-2xl font-bold text-gray-900 mb-2">Hapus Promo</h1>
  <p class="text-gray-600 mb-6">
    Apakah Anda yakin ingin menghapus kode promo
    <span class="font-bold text-gray-900">{{ promotion.promo_code }}</span>?
    Relasi penggunaan promo pada order akan ikut dilepas.
  </p>

  <form method="post" class="flex justify-end gap-3">
    {% csrf_token %}
    <a href="{% url 'promotions:promotion_list' %}" class="px-5 py-2 border rounded-xl font-semibold">Batal</a>
    <button class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold">Hapus</button>
  </form>
</div>
{% endblock %}
