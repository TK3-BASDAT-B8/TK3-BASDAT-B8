{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow p-8">
  <a href="{% url 'accounts:register' %}" class="text-sm text-blue-600">← Kembali</a>
  <h1 class="text-xl font-bold mt-4">Daftar sebagai Pelanggan</h1>
  <p class="text-sm text-slate-500 mb-5">Buat akun baru untuk mengakses pemesanan Anda</p>

  {% if error %}
  <div class="bg-red-50 border border-red-300 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">{{ error }}</div>
  {% endif %}

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <input name="full_name" class="w-full border rounded-lg px-3 py-2" placeholder="Nama lengkap" required>
    <input name="phone_number" class="w-full border rounded-lg px-3 py-2" placeholder="Nomor telepon" required>
    <input name="username" class="w-full border rounded-lg px-3 py-2" placeholder="Username" required>
    <input name="password" type="password" class="w-full border rounded-lg px-3 py-2" placeholder="Password" required>
    <input name="confirm_password" type="password" class="w-full border rounded-lg px-3 py-2" placeholder="Konfirmasi Password" required>
    <button class="w-full bg-black text-white py-2 rounded-lg">Daftar</button>
  </form>
</div>
{% endblock %}
