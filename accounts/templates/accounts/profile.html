{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-8">
  <h1 class="text-2xl font-bold">Profil Saya</h1>
  <p class="text-slate-500 mb-6">Kelola informasi pribadi dan preferensi akun Anda</p>

  <div class="border rounded-xl p-6">
    <div class="w-16 h-16 bg-blue-600 text-white rounded-full flex items-center justify-center text-2xl font-bold mb-4">
      {{ user.name|first }}
    </div>

    <p class="text-sm text-slate-500">Role</p>
    <p class="font-semibold mb-3">{{ user.role }}</p>

    <p class="text-sm text-slate-500">Nama</p>
    <p class="font-semibold mb-3">{{ user.name }}</p>

    <p class="text-sm text-slate-500">Email</p>
    <p class="font-semibold mb-3">{{ user.email }}</p>

    <p class="text-sm text-slate-500">Username</p>
    <p class="font-semibold">{{ user.username }}</p>
  </div>
</div>
{% endblock %}
