{% extends "base.html" %}
{% block title %}Update Password | TikTakTuk{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-2xl border shadow-sm p-6">
  <div class="flex items-start justify-between gap-4 mb-6">
    <div>
      <p class="text-sm font-semibold text-indigo-600">PROFIL</p>
      <h1 class="text-2xl font-bold text-gray-900">Update Password</h1>
      <p class="text-sm text-gray-500">Masukkan password lama dan password baru.</p>
    </div>
    <a href="{% url 'accounts:profile' %}" class="text-3xl leading-none text-gray-400 hover:text-gray-700">&times;</a>
  </div>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Password Lama</label>
      <input type="password" name="old_password" required class="w-full border rounded-xl px-4 py-2">
    </div>
    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Password Baru</label>
      <input type="password" name="new_password" required class="w-full border rounded-xl px-4 py-2">
    </div>
    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Konfirmasi Password Baru</label>
      <input type="password" name="confirm_password" required class="w-full border rounded-xl px-4 py-2">
    </div>
    <div class="flex justify-end gap-3 pt-4">
      <a href="{% url 'accounts:profile' %}" class="px-5 py-2 border rounded-xl font-semibold">Batal</a>
      <button class="px-5 py-2 bg-gray-900 hover:bg-black text-white rounded-xl font-semibold">Update Password</button>
    </div>
  </form>
</div>
{% endblock %}
