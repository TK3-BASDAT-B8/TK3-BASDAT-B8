{% extends "base.html" %}
{% block title %}Edit Profil | TikTakTuk{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-2xl border shadow-sm p-6">
  <div class="flex items-start justify-between gap-4 mb-6">
    <div>
      <p class="text-sm font-semibold text-indigo-600">PROFIL</p>
      <h1 class="text-2xl font-bold text-gray-900">Edit Profil</h1>
      <p class="text-sm text-gray-500">Username tidak dapat diubah.</p>
    </div>
    <a href="{% url 'accounts:profile' %}" class="text-3xl leading-none text-gray-400 hover:text-gray-700">&times;</a>
  </div>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Username</label>
      <input value="{{ user.username }}" disabled class="w-full border rounded-xl px-4 py-2 bg-gray-100 text-gray-500">
    </div>

    {% if user.role == 'customer' %}
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nama Lengkap</label>
        <input name="full_name" required value="{{ user.name }}" class="w-full border rounded-xl px-4 py-2">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nomor Telepon</label>
        <input name="phone_number" value="{{ user.phone_number|default:'' }}" class="w-full border rounded-xl px-4 py-2">
      </div>
    {% elif user.role == 'organizer' %}
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nama Organizer</label>
        <input name="organizer_name" required value="{{ user.name }}" class="w-full border rounded-xl px-4 py-2">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Contact Email</label>
        <input type="email" name="contact_email" required value="{{ user.contact_email|default:'' }}" class="w-full border rounded-xl px-4 py-2">
      </div>
    {% endif %}

    <div class="flex justify-end gap-3 pt-4">
      <a href="{% url 'accounts:profile' %}" class="px-5 py-2 border rounded-xl font-semibold">Batal</a>
      <button class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold">Simpan</button>
    </div>
  </form>
</div>
{% endblock %}
