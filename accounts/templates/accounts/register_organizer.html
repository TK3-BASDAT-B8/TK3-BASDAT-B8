{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow p-8">
  <a href="{% url 'accounts:register' %}" class="text-sm text-blue-600">← Kembali</a>
  <h1 class="text-xl font-bold mt-4">Daftar sebagai Penyelenggara</h1>
  <p class="text-sm text-slate-500 mb-5">Buat akun baru untuk mengelola acara Anda</p>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <input class="w-full border rounded-lg px-3 py-2" placeholder="Nama organizer" required>
    <input class="w-full border rounded-lg px-3 py-2" placeholder="Email kontak" required>
    <input class="w-full border rounded-lg px-3 py-2" placeholder="Nomor telepon" required>
    <input class="w-full border rounded-lg px-3 py-2" placeholder="Username" required>
    <input type="password" class="w-full border rounded-lg px-3 py-2" placeholder="Password" required>
    <input type="password" class="w-full border rounded-lg px-3 py-2" placeholder="Konfirmasi Password" required>
    <button class="w-full bg-black text-white py-2 rounded-lg">Daftar</button>
  </form>
</div>
{% endblock %}
