{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-lg rounded-3xl border border-slate-100 bg-white p-6 shadow-sm"><h1 class="text-xl font-extrabold">Update Status Order</h1><p class="mt-1 text-sm text-slate-500">{{ selected_order.order_id }}</p><form method="post" class="mt-5 space-y-4">{% csrf_token %}<div><label class="mb-1.5 block text-xs font-extrabold uppercase text-slate-500">Customer</label><input value="{{ selected_order.customer_name }}" disabled class="h-12 w-full rounded-2xl border border-slate-100 bg-slate-50 px-4 text-sm"></div><div><label class="mb-1.5 block text-xs font-extrabold uppercase text-slate-500">Payment Status</label><select name="payment_status" class="h-12 w-full rounded-2xl border border-slate-200 px-4 text-sm">{% for status in payment_statuses %}<option value="{{ status }}" {% if selected_order.payment_status == status %}selected{% endif %}>{{ status }}</option>{% endfor %}</select></div><div class="grid grid-cols-2 gap-3"><a href="{% url 'orders:order_list' %}" class="inline-flex h-11 items-center justify-center rounded-2xl border border-slate-200 text-sm font-extrabold text-slate-700">Batal</a><button class="h-11 rounded-2xl bg-blue-600 text-sm font-extrabold text-white">Update</button></div></form></div>
{% endblock %}
