{% extends "base.html" %}
{% block content %}
<div class="mx-auto max-w-lg rounded-3xl border border-slate-100 bg-white p-6 shadow-sm">
    <h1 class="text-xl font-extrabold text-red-600">Hapus Order</h1>
    <p class="mt-4 text-sm text-slate-600">
        Yakin ingin menghapus order <span class="font-mono">{{ selected_order.order_id }}</span> milik <strong>{{ selected_order.customer_name }}</strong>? Tiket dan relasi kursi dari order ini akan ikut dihapus.
    </p>
    
    <!-- Perubahan di grid-cols-1 dan gap-3 -->
    <form method="post" class="mt-6 grid grid-cols-1 gap-3">
        {% csrf_token %}
        <button type="submit" class="h-11 w-full rounded-2xl bg-red-600 text-sm font-extrabold text-white order-1">
            Hapus
        </button>
        <a href="{% url 'orders:order_list' %}" class="inline-flex h-11 w-full items-center justify-center rounded-2xl border border-slate-200 text-sm font-extrabold text-slate-700 order-2">
            Batal
        </a>
    </form>
</div>
{% endblock %}
